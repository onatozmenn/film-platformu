name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Foundation quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: film_platform_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d film_platform_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/film_platform_test?schema=public
      LOG_LEVEL: warn
      NEXT_PUBLIC_SITE_NAME: Film Platform
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/film_platform_test?schema=public
      TRUST_INCOMING_REQUEST_ID: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit and component tests
        run: pnpm test

      - name: Run PostgreSQL integration tests
        run: pnpm test:integration

      - name: Check database state
        run: pnpm db:check

      - name: Build production application
        run: pnpm build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: pnpm test:e2e

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-evidence
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
